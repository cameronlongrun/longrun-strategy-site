<svg width="340" height="100" viewBox="0 0 340 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Longrun Strategy">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,600;1,6..72,600&family=Work+Sans:wght@600&display=swap');
      .wm { font-family: 'Newsreader', Georgia, serif; font-size: 64px; font-weight: 600; }
      .wm-long { fill: #2A2622; }
      .wm-run { fill: #B75B32; font-style: italic; }
      .wm-sub { font-family: 'Work Sans', Arial, sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 5px; fill: #6B6459; }
    </style>
  </defs>
  <text x="4" y="64" class="wm"><tspan class="wm-long">Long</tspan><tspan class="wm-run">run</tspan></text>
