<svg width="340" height="100" viewBox="0 0 340 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Longrun Strategy">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@600&display=swap');
      .wm { font-family: 'Playfair Display', Georgia, serif; font-size: 64px; font-weight: 700; }
      .wm-long { fill: #0B1F3A; }
      .wm-run { fill: #B4924C; font-style: italic; }
      .wm-sub { font-family: 'Inter', Arial, sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 5px; fill: #5C6470; }
    </style>
  </defs>
  <text x="4" y="64" class="wm"><tspan class="wm-long">Long</tspan><tspan class="wm-run">run</tspan></text>
  <text x="6" y="90" class="wm-sub">STRATEGY</text>
</svg>
